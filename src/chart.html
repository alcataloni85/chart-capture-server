<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #131722; width: 1200px; height: 600px; overflow: hidden; }
.chart { width: 1200px; height: 600px; }
</style>
</head>
<body>
<div class="chart">
<div class="tradingview-widget-container" style="height:600px">
<div id="tv_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  autosize: false,
  width: 1200,
  height: 600,
  symbol: "SYMBOL_PLACEHOLDER",
  interval: "INTERVAL_PLACEHOLDER",
  timezone: "Etc/UTC",
  theme: "dark",
  style: "1",
  locale: "en",
  toolbar_bg: "#131722",
  hide_top_toolbar: false,
  hide_legend: false,
  save_image: false,
  container_id: "tv_chart"
});
</script>
</div>
</div>
</body>
</html>
